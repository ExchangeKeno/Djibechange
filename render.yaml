services:
  - type: web
    name: djib-exchange
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn djib_exchange.wsgi:application"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: djib-exchange-db
          property: connectionString

databases:
  - name: djib-exchange-db
    databaseName: djibexchange
    user: djibexchange
