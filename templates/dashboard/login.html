{% load static %}<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — DJIB Exchange</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
<div class="particles"></div>

<div class="login-page">
  <div class="login-card">
    <a href="{% url 'home' %}" class="logo" style="display:flex;justify-content:center;margin-bottom:32px;text-decoration:none;">
      <div class="logo-icon">DX</div>
      <span class="gradient-text" style="font-size:1.4rem;font-weight:800;margin-left:10px;">DJIB Exchange</span>
    </a>
    <h2>Admin Dashboard</h2>
    <p class="sub">Sign in to manage exchange requests</p>

    {% if messages %}
      {% for msg in messages %}
      <div class="alert alert-danger"><span>⚠</span> {{ msg }}</div>
      {% endfor %}
    {% endif %}

    <form method="post" novalidate>
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-input" placeholder="admin" autofocus required>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-input" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block" style="margin-top:8px;">Sign In</button>
    </form>

    <div style="text-align:center;margin-top:20px;">
      <a href="{% url 'home' %}" style="font-size:0.83rem;color:var(--text-muted);">← Back to main site</a>
    </div>
  </div>
</div>

<script src="{% static 'js/main.js' %}"></script>
</body>
</html>
